<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>One Piece TCG</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}

header {
  background: #1e40af;
  color: white;
  padding: 20px;
}

.container {
  display: flex;
  height: calc(100vh - 80px);
}

.left {
  flex: 3;
  padding: 20px;
  overflow-y: auto;
}

.right {
  flex: 1.5;
  background: #fff;
  border-left: 2px solid #ddd;
  padding: 15px;
  overflow-y: auto;
}

.search {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 200px);
  gap: 16px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  text-align: center;
  position: relative;
}

.card img {
  width: 100%;
  min-height: 280px;
  border-radius: 8px;
  background: #eee;
}

.card input {
  position: absolute;
  top: 8px;
  left: 8px;
  transform: scale(1.4);
}

.collage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 120px);
  gap: 10px;
}

.collage-item {
  position: relative;
}

.collage-item img {
  width: 100%;
  border-radius: 8px;
}

.remove-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
<h1>One Piece TCG</h1>
</header>

<div class="container">

<div class="left">
  <div class="search">
    <input id="searchInput" placeholder="OP01 / OP01-006 / Luffy"
           onkeydown="if(event.key==='Enter') search()">
    <button onclick="search()">חפש</button>
  </div>
  <div class="grid" id="results"></div>
</div>

<div class="right">
  <h2>🖼️ קולאז'</h2>
  <div class="collage-grid" id="collage"></div>
</div>

</div>

<script>
const IMAGE_BASE = "https://img.expressdeal.ink";
const MAX_RESULTS = 60;
let cards = [];
const selected = new Map();

fetch("cards.json")
  .then(r => r.json())
  .then(d => cards = d)
  .catch(() => alert("שגיאה בטעינת cards.json"));

function buildImage(cardIdRaw) {
  const cardId = cardIdRaw.toUpperCase();
  const set = cardId.split("-")[0];
  const base = `${IMAGE_BASE}/${set}/${cardId}`;

  const img = document.createElement("img");
  img.loading = "lazy";
  img.dataset.tried = "png";

  img.onerror = () => {
    if (img.dataset.tried === "png") {
      img.dataset.tried = "jpg";
      img.src = base + ".jpg";
    } else {
      img.style.opacity = "0.3";
    }
  };

  img.src = base + ".png";
  return img;
}

function search() {
  const q = searchInput.value.toLowerCase();
  results.innerHTML = "";

  cards.filter(c =>
    c.id.toLowerCase().includes(q) ||
    (c.name && c.name.toLowerCase().includes(q))
  ).slice(0, MAX_RESULTS).forEach(card => {
    const div = document.createElement("div");
    div.className = "card";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.onchange = e => {
      e.target.checked
        ? selected.set(card.id, card)
        : selected.delete(card.id);
      renderCollage();
    };

    div.appendChild(cb);
    div.appendChild(buildImage(card.id));
    div.innerHTML += `<div><b>${card.id}</b></div>`;
    results.appendChild(div);
  });
}

function renderCollage() {
  collage.innerHTML = "";
  selected.forEach(card => {
    const div = document.createElement("div");
    div.className = "collage-item";

    const btn = document.createElement("button");
    btn.className = "remove-btn";
    btn.textContent = "−";
    btn.onclick = () => {
      selected.delete(card.id);
      renderCollage();
    };

    div.appendChild(btn);
    div.appendChild(buildImage(card.id));
    collage.appendChild(div);
  });
}
</script>

</body>
</html>
