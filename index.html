<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <title>One Piece TCG – Card Collage</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
    }

    header {
      background: linear-gradient(90deg, #1e40af, #2563eb);
      color: white;
      padding: 20px;
    }

    header h1 {
      margin: 0;
    }

    header p {
      margin: 5px 0 0;
      opacity: 0.9;
    }

    .container {
      display: flex;
      height: calc(100vh - 100px);
    }

    .left {
      flex: 3;
      padding: 20px;
      overflow-y: auto;
    }

    .right {
      flex: 1.5;
      background: #fff;
      border-left: 2px solid #ddd;
      padding: 15px;
      overflow-y: auto;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      font-size: 15px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 200px);
      gap: 16px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      position: relative;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card input {
      position: absolute;
      top: 8px;
      left: 8px;
      transform: scale(1.4);
    }

    .card .id {
      margin-top: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    /* Collage */
    .collage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 120px);
      gap: 10px;
    }

    .collage-item {
      position: relative;
    }

    .collage-item img {
      width: 100%;
      border-radius: 8px;
    }

    .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>One Piece TCG</h1>
  <p>חיפוש קלפים + יצירת קולאז’</p>
</header>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="search-bar">
      <input
        id="searchInput"
        placeholder="שם / EB02 / EB02-003"
        onkeydown="if(event.key==='Enter') search()"
      />
      <button onclick="search()">חפש</button>
    </div>

    <div class="grid" id="results"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2>🖼️ הקולאז’</h2>
    <div class="collage-grid" id="collageGrid"></div>
  </div>

</div>

<script>
/**
 * CONFIG
 */
const IMAGE_BASE = "https://img.expressdeal.ink";

/**
 * DEMO DATA
 * אתה יכול להחליף את זה לטעינה מקובץ JSON:
 * fetch('cards.json').then(r => r.json())
 */
const cards = [
  { id: "EB02-001", name: "Kuro" },
  { id: "EB02-002", name: "Sabo" },
  { id: "EB02-003", name: "Tony Tony Chopper" },
  { id: "OP01-001", name: "Luffy" },
  { id: "OP01-002", name: "Zoro" }
];

const selected = new Map();

/**
 * Build image URL
 */
function imageUrl(cardId) {
  const set = cardId.split("-")[0];
  return `${IMAGE_BASE}/${set}/${cardId}.png`;
}

/**
 * Search logic
 */
function search() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const grid = document.getElementById("results");
  grid.innerHTML = "";

  if (!q) return;

  const filtered = cards.filter(c =>
    c.id.toLowerCase().includes(q) ||
    c.name.toLowerCase().includes(q)
  );

  if (filtered.length === 0) {
    grid.innerHTML = "<p>לא נמצאו קלפים</p>";
    return;
  }

  filtered.forEach(card => {
    const img = imageUrl(card.id);
    const checked = selected.has(img) ? "checked" : "";

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <input type="checkbox" ${checked}
        onchange="toggleCard('${img}', this.checked)">
      <img src="${img}" loading="lazy">
      <div class="id">${card.id}</div>
      <div>${card.name}</div>
    `;
    grid.appendChild(div);
  });
}

/**
 * Collage logic
 */
function toggleCard(img, checked) {
  if (checked) {
    selected.set(img, img);
  } else {
    selected.delete(img);
  }
  renderCollage();
}

function removeFromCollage(img) {
  selected.delete(img);

  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    if (cb.parentElement.innerHTML.includes(img)) {
      cb.checked = false;
    }
  });

  renderCollage();
}

function renderCollage() {
  const grid = document.getElementById("collageGrid");
  grid.innerHTML = "";

  selected.forEach(src => {
    const div = document.createElement("div");
    div.className = "collage-item";
    div.innerHTML = `
      <button class="remove-btn" onclick="removeFromCollage('${src}')">−</button>
      <img src="${src}">
    `;
    grid.appendChild(div);
  });
}
</script>

</body>
</html>
