<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>One Piece TCG – Card Collage</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
    }

    header {
      background: linear-gradient(90deg, #1e40af, #2563eb);
      color: white;
      padding: 20px;
    }

    header h1 {
      margin: 0;
    }

    header p {
      margin: 6px 0 0;
      opacity: 0.9;
    }

    .container {
      display: flex;
      height: calc(100vh - 96px);
    }

    .left {
      flex: 3;
      padding: 20px;
      overflow-y: auto;
    }

    .right {
      flex: 1.5;
      background: #fff;
      border-left: 2px solid #ddd;
      padding: 15px;
      overflow-y: auto;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      font-size: 15px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 200px);
      gap: 16px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      position: relative;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      background: #eee;
      min-height: 280px;
    }

    .card input {
      position: absolute;
      top: 8px;
      left: 8px;
      transform: scale(1.4);
    }

    .card .id {
      margin-top: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    .collage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 120px);
      gap: 10px;
      margin-top: 10px;
    }

    .collage-item {
      position: relative;
    }

    .collage-item img {
      width: 100%;
      border-radius: 8px;
    }

    .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>One Piece TCG</h1>
  <p>חיפוש קלפים + יצירת קולאז’</p>
</header>

<div class="container">

  <div class="left">
    <div class="search-bar">
      <input
        id="searchInput"
        placeholder="שם / OP01 / EB02-003"
        onkeydown="if(event.key==='Enter') search()"
      />
      <button onclick="search()">חפש</button>
    </div>

    <div class="grid" id="results"></div>
  </div>

  <div class="right">
    <h2>🖼️ הקולאז’</h2>
    <div class="collage-grid" id="collageGrid"></div>
  </div>

</div>

<script>
/* ================= CONFIG ================= */
const IMAGE_BASE = "https://img.expressdeal.ink";
const MAX_RESULTS = 60;

/* ================= STATE ================= */
let cards = [];
const selected = new Map();

/* ================= LOAD DATA ================= */
fetch("cards.json")
  .then(res => res.json())
  .then(data => {
    cards = data;
    console.log("Loaded cards:", cards.length);
  })
  .catch(() => alert("שגיאה בטעינת cards.json"));

/* ================= IMAGE BUILDER ================= */
function buildImage(cardId) {
  const set = cardId.split("-")[0];
  const base = `${IMAGE_BASE}/${set}/${cardId}`;

  const img = document.createElement("img");
  img.loading = "lazy";
  img.src = base + ".png";

  img.onerror = () => {
    if (!img.dataset.triedJpg) {
      img.dataset.triedJpg = "1";
      img.src = base + ".jpg";
    } else {
      img.style.opacity = "0.3";
    }
  };

  return img;
}

/* ================= SEARCH ================= */
function search() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const grid = document.getElementById("results");
  grid.innerHTML = "";

  if (!q) return;

  const results = cards.filter(c =>
    c.id.toLowerCase().includes(q) ||
    c.set.toLowerCase().includes(q) ||
    (c.name && c.name.toLowerCase().includes(q))
  );

  if (results.length === 0) {
    grid.innerHTML = "<p>לא נמצאו קלפים</p>";
    return;
  }

  results.slice(0, MAX_RESULTS).forEach(card => {
    const div = document.createElement("div");
    div.className = "card";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = selected.has(card.id);

    checkbox.onchange = e => {
      if (e.target.checked) {
        selected.set(card.id, card);
      } else {
        selected.delete(card.id);
      }
      renderCollage();
    };

    div.appendChild(checkbox);
    div.appendChild(buildImage(card.id));
    div.innerHTML += `
      <div class="id">${card.id}</div>
      <div>${card.name || ""}</div>
    `;

    grid.appendChild(div);
  });
}

/* ================= COLLAGE ================= */
function renderCollage() {
  const grid = document.getElementById("collageGrid");
  grid.innerHTML = "";

  selected.forEach(card => {
    const div = document.createElement("div");
    div.className = "collage-item";

    const img = buildImage(card.id);
    const btn = document.createElement("button");
    btn.className = "remove-btn";
    btn.innerText = "−";
    btn.onclick = () => {
      selected.delete(card.id);
      renderCollage();
    };

    div.appendChild(btn);
    div.appendChild(img);
    grid.appendChild(div);
  });
}
</script>

</body>
</html>
