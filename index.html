<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>One Piece TCG – Collage Builder</title>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(180deg, #eef2ff, #f8fafc);
  color: #111827;
}

/* ===== HERO ===== */
.hero {
  background: linear-gradient(120deg, #1e3a8a, #2563eb);
  color: white;
  padding: 40px 20px;
}

.hero-content {
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

.hero h1 {
  margin: 0;
  font-size: 36px;
}

.hero p {
  margin-top: 8px;
  opacity: 0.9;
}

.showcase {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 25px;
}

.showcase img {
  width: 140px;
  border-radius: 14px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  transition: transform .3s;
}

.showcase img:hover {
  transform: scale(1.06);
}

/* ===== SETS BAR ===== */
.sets-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  background: white;
  border-bottom: 1px solid #e5e7eb;
}

.sets-bar button {
  background: #e5e7eb;
  border: none;
  padding: 8px 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
}

.sets-bar button:hover {
  background: #2563eb;
  color: white;
}

/* ===== LAYOUT ===== */
.container {
  display: flex;
  height: calc(100vh - 260px);
}

/* LEFT */
.left {
  flex: 3;
  padding: 20px;
  overflow-y: auto;
}

/* RIGHT */
.right {
  flex: 1.4;
  background: white;
  border-left: 2px solid #e5e7eb;
  padding: 15px;
  overflow-y: auto;
}

/* ===== SEARCH ===== */
.search-bar {
  display: flex;
  gap: 10px;
}

.search-bar input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
}

.search-bar button {
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 16px;
  cursor: pointer;
}

/* ===== CARDS GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 200px);
  gap: 18px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  position: relative;
  text-align: center;
  transition: transform .2s;
}

.card:hover {
  transform: translateY(-4px);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card input {
  position: absolute;
  top: 10px;
  left: 10px;
  transform: scale(1.4);
}

/* ===== COLLAGE ===== */
.collage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 120px);
  gap: 12px;
  margin-top: 10px;
}

.collage-item {
  position: relative;
}

.collage-item img {
  width: 100%;
  border-radius: 10px;
}

.remove-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: #dc2626;
  color: white;
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  cursor: pointer;
  font-weight: bold;
}

.hint {
  font-size: 13px;
  color: #6b7280;
}
</style>
</head>

<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-content">
    <h1>One Piece TCG Collage</h1>
    <p>בחר קלפים • צור קולאז’ • שתף</p>

    <!-- Showcase images (שים תמונות אמיתיות) -->
    <div class="showcase">
      <img src="images/OP01-001.png">
      <img src="images/OP07-019.png">
      <img src="images/ST10-012.png">
    </div>
  </div>
</header>

<!-- SET FILTERS -->
<nav class="sets-bar">
  <button onclick="quickSearch('OP01')">OP01</button>
  <button onclick="quickSearch('OP02')">OP02</button>
  <button onclick="quickSearch('OP07')">OP07</button>
  <button onclick="quickSearch('ST10')">ST10</button>
  <button onclick="quickSearch('P-')">Promo</button>
</nav>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h2>🔍 חיפוש קלפים</h2>

    <div class="search-bar">
      <input
        id="searchInput"
        placeholder="שם / OP07 / OP07-019"
        onkeydown="if(event.key==='Enter') search()"
      />
      <button onclick="search()">חפש</button>
    </div>

    <div class="grid" id="results"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2>🖼️ הקולאז’</h2>
    <p class="hint">לחץ על − להסרה</p>
    <div class="collage-grid" id="collageGrid"></div>
  </div>

</div>

<script>
const selected = new Map(); // image -> image

function quickSearch(value) {
  document.getElementById("searchInput").value = value;
  search();
}

async function search() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;

  const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
  const cards = await res.json();

  const grid = document.getElementById("results");
  grid.innerHTML = "";

  if (cards.length === 0) {
    grid.innerHTML = "<p>לא נמצאו קלפים</p>";
    return;
  }

  cards.forEach(card => {
    const checked = selected.has(card.image) ? "checked" : "";

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <input type="checkbox" ${checked}
        onchange="toggleCard('${card.image}', this.checked)">
      <img src="${card.image}">
      <p>${card.id}</p>
    `;
    grid.appendChild(div);
  });
}

function toggleCard(img, checked) {
  if (checked) {
    selected.set(img, img);
  } else {
    selected.delete(img);
  }
  renderCollage();
}

function removeFromCollage(img) {
  selected.delete(img);

  document
    .querySelectorAll("input[type=checkbox]")
    .forEach(cb => {
      if (cb.parentElement.innerHTML.includes(img)) {
        cb.checked = false;
      }
    });

  renderCollage();
}

function renderCollage() {
  const grid = document.getElementById("collageGrid");
  grid.innerHTML = "";

  selected.forEach(src => {
    const div = document.createElement("div");
    div.className = "collage-item";
    div.innerHTML = `
      <button class="remove-btn" onclick="removeFromCollage('${src}')">−</button>
      <img src="${src}">
    `;
    grid.appendChild(div);
  });
}
</script>

</body>
</html>
